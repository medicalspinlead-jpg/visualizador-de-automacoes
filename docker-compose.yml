services:
  # Aplicacao Next.js
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fluxos-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
    env_file:
      - .env

  # Servico para rodar migracoes do Prisma
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fluxos-migrate
    environment:
      DATABASE_URL: ${DATABASE_URL}
    env_file:
      - .env
    command: npx prisma migrate deploy
    profiles:
      - migrate
